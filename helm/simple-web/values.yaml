#############
# Deployment
#############

replicaCount: 2 
imageRepository: acrinterview.azurecr.io/simple-web
imageTag: latest
labels:
  app: simple-web

appContainerPort: 80
# Resources
deploymentCpuRequests: "200m"
deploymentMemoryRequests: "128Mi"
deploymentCpuLimits: "500m"
deploymentMemoryLimits: "512Mi"
# Rolling update
deploymentMaxSurge: "25%"
deploymentMaxUnavailable: 0

#############
# Pull Secret
#############
secretName: acr-pull-secret
secretType: kubernetes.io/dockerconfigjson

#############
# Service
#############
serviceName: simple-web
serviceType: ClusterIP
serviceClusterPort: 80
serviceTargetPort: 80

#############
# Ingress
#############
ingressClassName: nginx

#################
# KEDA Autoscaler
#################
kedaMinReplicaCount: 2
kedaMaxReplicaCount: 10
kedaCpuTriggerValue: "70"
kedaMemoryTriggerValue: "80"

